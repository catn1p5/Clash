proxy-providers:
    Nex:
      url: ""
      type: http
      interval: 86400
      health-check: {enable: true,url: "https://www.gstatic.com/generate_204", interval: 300}
  
  
  proxies: 
    - name: "зӣҙиҝһ"
      type: direct
      udp: true
  
  mixed-port: 7890
  ipv6: true
  allow-lan: true
  unified-delay: false
  tcp-concurrent: true
  external-controller: 127.0.0.1:9090
  external-ui: ui
  external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"
  
  geodata-mode: true
  geox-url:
    geoip: "https://mirror.ghproxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
    geosite: "https://mirror.ghproxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
    mmdb: "https://mirror.ghproxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
    asn: "https://mirror.ghproxy.com/https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"
  
  find-process-mode: strict
  global-client-fingerprint: chrome
  
  profile:
    store-selected: true
    store-fake-ip: true
  
  sniffer:
    enable: true
    sniff:
      HTTP:
        ports: [80, 8080-8880]
        override-destination: true
      TLS:
        ports: [443, 8443]
      QUIC:
        ports: [443, 8443]
    skip-domain:
      - "Mijia Cloud"
      - "+.push.apple.com"
  
  tun:
    enable: true
    stack: mixed
    dns-hijack:
      - "any:53"
      - "tcp://any:53"
    auto-route: true
    auto-redirect: true
    auto-detect-interface: true
  
  dns:
    enable: true
    ipv6: true
    respect-rules: true
    enhanced-mode: fake-ip
    fake-ip-filter:
      - "*"
      - "+.lan"
      - "+.local"
      - "+.market.xiaomi.com"
    nameserver:
      - https://120.53.53.53/dns-query
      - https://223.5.5.5/dns-query
    proxy-server-nameserver:
      - https://120.53.53.53/dns-query
      - https://223.5.5.5/dns-query
    nameserver-policy:
      "geosite:cn,private":
        - https://120.53.53.53/dns-query
        - https://223.5.5.5/dns-query
      "geosite:geolocation-!cn":
        - "https://dns.cloudflare.com/dns-query"
        - "https://dns.google/dns-query"
  
  proxy-groups:
  
    - name: Global
      type: select
      proxies: [Auto,зӣҙиҝһ,HK,TW,JP,SG,US,Others,All]
  
    - name: Google
      type: select
      proxies: [Global,HK,TW,JP,SG,US,Others,All,Auto,зӣҙиҝһ]
  
    - name: Telegram
      type: select
      proxies: [Global,HK,TW,JP,SG,US,Others,All,Auto,зӣҙиҝһ]
  
    - name: Twitter
      type: select
      proxies: [Global,HK,TW,JP,SG,US,Others,All,Auto,зӣҙиҝһ]
  
    - name: е“”е“©е“”е“©
      type: select
      proxies: [Global,HK,TW,JP,SG,US,Others,All,Auto,зӣҙиҝһ]
  
    - name: е·ҙе“Ҳе§Ҷзү№
      type: select
      proxies: [Global,HK,TW,JP,SG,US,Others,All,Auto,зӣҙиҝһ]
  
    - name: YouTube
      type: select
      proxies: [Global,HK,TW,JP,SG,US,Others,All,Auto,зӣҙиҝһ]
  
    - name: NETFLIX
      type: select
      proxies: [Global,HK,TW,JP,SG,US,Others,All,Auto,зӣҙиҝһ]
  
    - name: Spotify
      type: select
      proxies:  [Global,HK,TW,JP,SG,US,Others,All,Auto,зӣҙиҝһ]
  
    - name: Github
      type: select
      proxies:  [Global,HK,TW,JP,SG,US,Others,All,Auto,зӣҙиҝһ]
  
    - name: China
      type: select
      proxies:  [зӣҙиҝһ,Global,HK,TW,JP,SG,US,Others,All,Auto]
  
    - name: Final
      type: select
      proxies:  [Global,HK,TW,JP,SG,US,Others,All,Auto,зӣҙиҝһ]
  
    #еҲҶйҡ”,дёӢйқўжҳҜең°еҢәеҲҶз»„
    - name: All
      type: select
      include-all: true
  
    - name: Auto
      type: url-test
      include-all: true
      tolerance: 10

    - name: HK
      type: select
      include-all: true
      filter: "(?i)жёҜ|hk|hongkong|hong kong"
  
    - name: TW
      type: select
      include-all: true
      filter: "(?i)еҸ°|tw|taiwan"
  
    - name: JP
      type: select
      include-all: true
      filter: "(?i)ж—Ҙ|jp|japan"
  
    - name: US
      type: select
      include-all: true
      filter: "(?i)зҫҺ|us|unitedstates|united states"
  
    - name: SG
      type: select
      include-all: true
      filter: "(?i)(ж–°|sg|singapore)"
  
    - name: Others
      type: select
      include-all: true
      filter: "(?i)^(?!.*(?:рҹҮӯрҹҮ°|рҹҮҜрҹҮө|рҹҮәрҹҮё|рҹҮёрҹҮ¬|рҹҮЁрҹҮі|жёҜ|hk|hongkong|еҸ°|tw|taiwan|ж—Ҙ|jp|japan|ж–°|sg|singapore|зҫҺ|us|unitedstates)).*"
  
  
  rules:
    - GEOIP,lan,зӣҙиҝһ,no-resolve
    - GEOSITE,github,Github
    - GEOSITE,twitter,Twitter
    - GEOSITE,youtube,YouTube
    - GEOSITE,google,Google
    - GEOSITE,telegram,Telegram
    - GEOSITE,netflix,NETFLIX
    - GEOSITE,bilibili,е“”е“©е“”е“©
    - GEOSITE,bahamut,е·ҙе“Ҳе§Ҷзү№
    - GEOSITE,spotify,Spotify
    - GEOSITE,CN,China
    - GEOSITE,geolocation-!cn,Final
  
    - GEOIP,google,Google
    - GEOIP,netflix,NETFLIX
    - GEOIP,telegram,Telegram
    - GEOIP,twitter,Twitter
    - GEOIP,CN,China
    - MATCH,Final